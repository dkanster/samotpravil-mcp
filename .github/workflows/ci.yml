name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docusaurus/package-lock.json
      - run: npm ci
      - run: npm ci --prefix docusaurus
      - run: npm run lint
      - run: npm audit --audit-level=high
        continue-on-error: true
      - run: npm test

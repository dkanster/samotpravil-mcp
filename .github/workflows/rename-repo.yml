name: Rename repository

# Auto-runs once when .github/rename-repo.trigger is pushed to main.
# Uses GITHUB_TOKEN with administration:write (repo Settings → Actions → General:
# "Read and write permissions" must be enabled for administration scope).
on:
  push:
    branches: [main]
    paths:
      - .github/rename-repo.trigger

permissions:
  administration: write
  contents: read

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - name: Rename GitHub repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT="${{ github.repository }}"
          NEW_NAME="samotpravil-api-mcp"
          if [ "${CURRENT##*/}" = "$NEW_NAME" ]; then
            echo "Repository already named $NEW_NAME"
            exit 0
          fi
          gh api -X PATCH "repos/${CURRENT}" -f name="${NEW_NAME}"
          echo "Renamed ${CURRENT} → ${CURRENT%/*}/${NEW_NAME}"

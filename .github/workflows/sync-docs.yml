name: Sync docs snapshot

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Sync Postman snapshot
        run: npm run sync-docs

      - name: Regenerate OpenAPI
        run: npm run export-openapi

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: sync documentation snapshot"
          title: "chore: sync documentation snapshot"
          body: |
            Automated weekly sync from documentation.samotpravil.ru.

            - `data/collection.snapshot.json`
            - `data/snapshot.meta.json`
            - `data/openapi.yaml`
          branch: chore/sync-docs-snapshot
          delete-branch: true

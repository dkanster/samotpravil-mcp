name: Deploy Docusaurus

on:
  push:
    branches: [main]
    paths:
      - 'data/collection.snapshot.json'
      - 'docs/official/**'
      - 'docusaurus/**'
      - 'scripts/generate-docusaurus-content.mjs'
      - 'scripts/lib/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/docusaurus.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docusaurus-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docusaurus/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install Docusaurus dependencies
        run: npm ci --prefix docusaurus

      - name: Build Docusaurus site
        env:
          DOCUSAURUS_URL: https://dkanster.github.io
          DOCUSAURUS_BASE_URL: /samotpravil-api-mcp/
        run: npm run docusaurus:build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: docusaurus/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

name: Maintainer status weekly

on:
  schedule:
    # Monday 10:00 UTC — after org preflight (09:00)
    - cron: "0 10 * * 1"
  workflow_dispatch:

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Maintainer status report
        run: npm run maintainer-status
        continue-on-error: true

      - name: Superseded PR tracker
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run check-superseded-prs
        continue-on-error: true

      - name: v1.9 readiness
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run check-v19-readiness -- --warn-only
        continue-on-error: true

      - name: Generate handoff artifacts
        run: |
          npm run promo-handoff -- --write
          npm run org-handoff -- --write
        continue-on-error: true

      - name: Upload handoff artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maintainer-handoff
          path: artifacts/
          if-no-files-found: ignore

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      mcp-sdk:
        patterns:
          - "@modelcontextprotocol/*"
      dev-tools:
        patterns:
          - "typescript"
          - "tsx"
          - "@types/*"
          - "eslint*"
          - "@typescript-eslint/*"

  - package-ecosystem: npm
    directory: /docusaurus
    schedule:
      interval: monthly
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly

      description: "Валидация — это проверка имейла на соответствие требованиям к адресам электронной почты, на которые можно отправлять рассылки. Валидный имейл — это реально существующий и действующий адрес электронной почты. Поле Тип Обязательность Описание email string да Имейл, по которому был сделал запрос status string да Статус имейла. Возможные варианты: unknown - статус неизвестен valid - имейл валиден not valid - имейл невалиден is_valid bool нет Булевый ответ является ли имейл валидным."

      summary: Отправка XML v1
      description: "Возможные значения поля статус (#ed40973f-9603-41df-811d-0fbbd0d968c2) Пример XML-пакета <list> <body> <Data> <![CDATA[ <html> <img class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; src=\"cid:de43239e9118fe7c44d915072f99cd15\"/> // пример как встроить файл вёрстку Код: {{f"

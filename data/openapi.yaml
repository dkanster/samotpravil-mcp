      summary: Активность
      description: "Активность имейла - это метод, позволяющий получить информацию о том, как данный подписчик взаимодействует со своей почтой. Данные предоставляются в обезличенном формате на основе сборной аналитики клиентов сервиса. Поле Тип Описание timestamp string Дата последнего взаимодйствия с письмами в формате Timestamp activity_category string Категория подписчика Описание категорий подписчиков Категория Описание A Читал и переходил по письмам за последние 15 дней B Читал и переходил по письмам за послед"

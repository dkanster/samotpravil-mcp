  /api/v2/email/check:
    post:
      summary: Проверить верстку
      description: "Метод проверяет HTML-письмо на соответствие ряду правил качества и доступности. Возвращает найденные проблемы по категориям. Тело запроса (JSON) Поле Тип Обязательность Описание body string да HTML-контент письма для проверки. checks array да Список проверок, которые требуется выполнить. Каждый объект должен содержать поле category, а некоторые — дополнительный параметр limit. Поддерживаемые категории проверок missingAltText — отсутствие alt-текста у изображений missingImageLink — изображения бе"

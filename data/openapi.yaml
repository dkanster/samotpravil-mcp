      description: "Поле Тип Обязательность Описание email string да Имейл, по которому был сделал запрос corrected string да Исправленный имейл local string да Локальная часть (до собаки @) domain string да Домен имейла type string да personal - личный (@mail.ru, @yandex.ru) corp - корпоративный (@myshop.ru) role - «ролевой» (info@, support@) temp - одноразовый (@temp-mail.ru)"
      requestBody:
